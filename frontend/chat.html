<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 - 원포인트</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-sub: #f7f8fa;
            --bg-warm: #faf9f7;
            --bg-chat: #f0f1f5;
            --border: #e8e8ec;
            --border-light: #f0f0f4;
            --text-primary: #191f28;
            --text-secondary: #4e5968;
            --text-tertiary: #8b95a1;
            --text-muted: #b0b8c1;
            --accent: #e8622a;
            --accent-light: #fef0e8;
            --accent-hover: #d4551f;
            --expert-accent: #0f8a6a;
            --expert-light: #e8f6f1;
            --blue: #3182f6;
            --blue-light: #ebf4ff;
            --yellow: #f59e0b;
            --yellow-light: #fef3c7;
            --red: #ef4444;
            --red-light: #fef2f2;
            --purple: #8b5cf6;
            --purple-light: #f3f0ff;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
            --transition: 0.2s ease;
            --sidebar-w: 380px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; }

        /* ─── HEADER ─── */
        .header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            z-index: 50;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 9px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .logo-mark {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 800; color: #fff;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo:hover .logo-mark { transform: rotate(-6deg) scale(1.05); }

        .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-left: 4px;
        }
        .nav-tab {
            position: relative;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-tertiary);
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            white-space: nowrap;
        }
        .nav-tab:hover { color: var(--text-primary); background: rgba(0,0,0,0.03); }
        .nav-tab.active { color: var(--accent); font-weight: 700; }
        .nav-tab .nav-badge {
            position: absolute; top: 4px; right: 6px;
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .header-spacer { flex: 1; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .role-toggle {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            padding: 3px;
        }

        .role-btn {
            padding: 5px 14px;
            border-radius: 100px; border: none;
            background: transparent;
            font-size: 12px; font-weight: 700; font-family: inherit;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .role-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 6px rgba(232,98,42,0.25);
        }

        /* ─── LAYOUT ─── */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ─── SIDEBAR (Chat List) ─── */
        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg);
            flex-shrink: 0;
        }

        .sidebar-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-search input {
            width: 100%;
            height: 38px;
            padding: 0 14px 0 36px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px; font-family: inherit;
            background: var(--bg-sub);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        .sidebar-search input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .sidebar-search input::placeholder { color: var(--text-muted); }

        .sidebar-search-wrap {
            position: relative;
        }

        .sidebar-search-icon {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            color: var(--text-muted);
        }

        .sidebar-tabs {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-tab {
            padding: 10px 4px;
            margin-right: 16px;
            font-size: 13px; font-weight: 600;
            color: var(--text-tertiary);
            border: none; background: none;
            cursor: pointer; font-family: inherit;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .sidebar-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .sidebar-tab .badge {
            display: inline-flex;
            align-items: center; justify-content: center;
            min-width: 18px; height: 18px;
            padding: 0 5px;
            background: var(--accent);
            color: #fff;
            border-radius: 100px;
            font-size: 10px; font-weight: 700;
            margin-left: 4px;
            font-family: 'Outfit', sans-serif;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-track { background: transparent; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .chat-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        .chat-item:hover { background: var(--bg-sub); }
        .chat-item.active { background: var(--accent-light); }

        .chat-item-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--bg-sub);
            border: 2px solid var(--border-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            position: relative;
        }

        .avatar-online-dot {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 10px; height: 10px;
            background: var(--expert-accent);
            border: 2px solid var(--bg);
            border-radius: 50%;
        }

        .chat-item-body {
            flex: 1;
            min-width: 0;
        }

        .chat-item-top {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }

        .chat-item-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-type-badge {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .type-offline { background: var(--yellow-light); color: #92400e; }
        .type-online { background: var(--blue-light); color: #1e40af; }

        .chat-item-ticket {
            font-size: 12px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .chat-item-last-msg {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-right {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .chat-item-time {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .chat-item-unread {
            display: flex; align-items: center; justify-content: center;
            min-width: 20px; height: 20px;
            padding: 0 6px;
            background: var(--accent);
            color: #fff;
            border-radius: 100px;
            font-size: 11px; font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .chat-item-status-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-matched { background: var(--expert-light); color: var(--expert-accent); }
        .status-payment { background: var(--yellow-light); color: #92400e; }
        .status-progress { background: var(--blue-light); color: var(--blue); }
        .status-delivered { background: var(--purple-light); color: var(--purple); }
        .status-completed { background: var(--bg-sub); color: var(--text-tertiary); }
        .status-review { background: var(--accent-light); color: var(--accent); }

        /* ─── CHAT ROOM (Main Area) ─── */
        .chat-room {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            min-width: 0;
        }

        /* Empty State */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .chat-empty-icon {
            width: 80px; height: 80px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            box-shadow: var(--shadow-sm);
        }

        .chat-empty-title { font-size: 16px; font-weight: 700; color: var(--text-tertiary); }
        .chat-empty-desc { font-size: 13px; }

        /* Room Header */
        .room-header {
            height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .room-header-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--bg-sub);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .room-header-info { flex: 1; min-width: 0; }

        .room-header-name {
            font-size: 15px; font-weight: 700;
            display: flex; align-items: center; gap: 6px;
        }

        .room-header-sub {
            font-size: 12px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-header-actions {
            display: flex; gap: 6px;
        }

        /* ─── WORKFLOW TRACKER ─── */
        .workflow-bar {
            background: var(--bg);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .workflow-steps {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .workflow-steps::-webkit-scrollbar { display: none; }

        .wf-step {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            color: var(--text-muted);
            background: transparent;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .wf-step.done {
            color: var(--expert-accent);
        }

        .wf-step.done .wf-dot {
            background: var(--expert-accent);
        }

        .wf-step.current {
            color: var(--accent);
            background: var(--accent-light);
        }

        .wf-step.current .wf-dot {
            background: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px var(--accent-light); }
            50% { box-shadow: 0 0 0 6px rgba(255,107,53,0.1); }
        }

        .wf-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }

        .wf-arrow {
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border);
            flex-shrink: 0;
            font-size: 10px;
        }

        .wf-arrow.done { color: var(--expert-accent); }

        /* ─── MESSAGES ─── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.12) transparent;
        }

        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

        .msg-date-divider {
            text-align: center;
            padding: 16px 0 12px;
        }

        .msg-date-divider span {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(0,0,0,0.06);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            max-width: 70%;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.theirs {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
            position: relative;
        }

        .msg-row.mine .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.theirs .msg-bubble {
            background: var(--bg);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-xs);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            flex-shrink: 0;
            padding-bottom: 2px;
        }

        .msg-read {
            font-size: 10px;
            color: var(--blue);
            flex-shrink: 0;
            padding-bottom: 2px;
        }

        .msg-sender-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 4px;
            padding-left: 2px;
        }

        /* ─── System Messages ─── */
        .msg-system {
            align-self: center;
            max-width: 85%;
            text-align: center;
            padding: 16px 0 8px;
        }

        .msg-system-bubble {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.05);
            border-radius: 100px;
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .msg-system-bubble.warn {
            background: var(--yellow-light);
            color: #92400e;
        }

        .msg-system-icon { font-size: 14px; }

        /* ─── Agreement Card in Chat ─── */
        .msg-card {
            align-self: center;
            width: 100%;
            max-width: 420px;
            padding: 4px 0;
        }

        .agreement-card, .delivery-card, .payment-card, .review-card-msg {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 14px 18px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-header-icon {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .card-header-icon.agreement { background: var(--blue-light); }
        .card-header-icon.payment { background: var(--expert-light); }
        .card-header-icon.delivery { background: var(--purple-light); }
        .card-header-icon.review { background: var(--yellow-light); }

        .card-header-text h4 {
            font-size: 13px; font-weight: 700;
        }

        .card-header-text p {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .card-status {
            margin-left: auto;
            padding: 3px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
        }

        .card-status.proposed { background: var(--yellow-light); color: #92400e; }
        .card-status.confirmed { background: var(--expert-light); color: var(--expert-accent); }
        .card-status.rejected { background: var(--red-light); color: var(--red); }
        .card-status.submitted { background: var(--blue-light); color: var(--blue); }
        .card-status.approved { background: var(--expert-light); color: var(--expert-accent); }

        .card-body {
            padding: 14px 18px;
        }

        .card-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .card-field + .card-field {
            border-top: 1px solid var(--border-light);
        }

        .card-field-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .card-field-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-field-value.price {
            font-family: 'Outfit', sans-serif;
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
        }

        .card-actions {
            padding: 0 18px 14px;
            display: flex;
            gap: 8px;
        }

        .card-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }

        .card-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .card-btn.primary {
            background: var(--accent);
            color: #fff;
        }

        .card-btn.secondary {
            background: var(--bg-sub);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .card-btn.success {
            background: var(--expert-accent);
            color: #fff;
        }

        .card-btn.danger {
            background: var(--red-light);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.2);
        }

        .card-btn.blue {
            background: var(--blue);
            color: #fff;
        }

        .card-btn.purple {
            background: var(--purple);
            color: #fff;
        }

        /* Delivery Attachments */
        .delivery-files {
            display: flex;
            gap: 8px;
            padding: 8px 18px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .delivery-file {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg-sub);
            border-radius: var(--radius-sm);
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .delivery-file-icon { font-size: 14px; }

        /* ─── INPUT BAR ─── */
        .input-bar {
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .input-bar-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-attach-btn {
            width: 38px; height: 38px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .input-attach-btn:hover { background: var(--bg-sub); color: var(--text-secondary); }
        .input-attach-btn svg { width: 18px; height: 18px; }

        .input-field {
            flex: 1;
            min-height: 38px;
            max-height: 120px;
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-sub);
            color: var(--text-primary);
            outline: none;

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .sidebar { width: 320px; }
        }

        }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }

        }

        .msg-row, .msg-system, .msg-card {

};

const statusClasses = {
    MATCHED: 'status-matched', PAYMENT_PENDING: 'status-payment', PAID: 'status-progress',
    IN_PROGRESS: 'status-progress', DELIVERED: 'status-delivered', COMPLETED: 'status-completed',
};

// ─── RENDER CHAT LIST ───
function renderChatList(filter = 'all') {
    const list = document.getElementById('chatList');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    let rooms = chatRooms;

    if (filter === 'progress') {
        rooms = rooms.filter(r => !['COMPLETED','CANCELLED','EXPIRED'].includes(r.ticketStatus));
    } else if (filter === 'completed') {
        rooms = rooms.filter(r => r.ticketStatus === 'COMPLETED');
    }

    if (search) {
        rooms = rooms.filter(r =>
            r.opponentName.toLowerCase().includes(search) ||
            r.ticketTitle.toLowerCase().includes(search) ||
            r.category.toLowerCase().includes(search)
        );
    }

    list.innerHTML = rooms.map(room => `
        <div class="chat-item ${activeChatId === room.id ? 'active' : ''}" onclick="openChat('${room.id}')">
            <div class="chat-item-avatar">
                ${room.opponentEmoji}
                ${room.unreadCount > 0 ? '<div class="avatar-online-dot"></div>' : ''}
            </div>
            <div class="chat-item-body">
                <div class="chat-item-top">
                    <span class="chat-item-name">${room.opponentName}</span>
                    <span class="chat-item-type-badge ${room.ticketType === 'OFFLINE' ? 'type-offline' : 'type-online'}">
                        ${room.ticketType === 'OFFLINE' ? '오프라인' : '온라인'}
                    </span>
                </div>
                <div class="chat-item-ticket">${room.category} · ${room.ticketTitle}</div>
                <div class="chat-item-last-msg">${room.lastMessageType === 'SYSTEM' ? '📌 ' : ''}${room.lastMessage}</div>
            </div>
            <div class="chat-item-right">
                <span class="chat-item-time">${room.lastMessageAt}</span>
                ${room.unreadCount > 0 ? `<span class="chat-item-unread">${room.unreadCount}</span>` : ''}
                ${room.reviewPending ? `<span class="chat-item-status-tag status-review">리뷰 대기</span>` :
                  `<span class="chat-item-status-tag ${statusClasses[room.ticketStatus] || ''}">${statusLabels[room.ticketStatus] || room.ticketStatus}</span>`}
            </div>
        </div>
    `).join('');
}

function filterTab(btn, filter) {
    document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderChatList(filter);
}

function filterChats() { renderChatList(document.querySelector('.sidebar-tab.active')?.textContent?.includes('진행') ? 'progress' : document.querySelector('.sidebar-tab.active')?.textContent?.includes('완료') ? 'completed' : 'all'); }

// ─── OPEN CHAT ───
function openChat(roomId) {
    activeChatId = roomId;
    const room = chatRooms.find(r => r.id === roomId);
    if (!room) return;

    // Mark as read
    room.unreadCount = 0;

    document.getElementById('chatEmpty').style.display = 'none';
    const activeRoom = document.getElementById('activeRoom');
    activeRoom.style.display = 'flex';

    // Update header
    document.getElementById('roomAvatar').textContent = room.opponentEmoji;
    document.getElementById('roomName').textContent = room.opponentName;
    document.getElementById('roomSub').textContent = `${room.category} · ${room.ticketTitle}`;
    const badge = document.getElementById('roomTypeBadge');
    badge.textContent = room.ticketType === 'OFFLINE' ? '오프라인' : '온라인';
    badge.className = `chat-item-type-badge ${room.ticketType === 'OFFLINE' ? 'type-offline' : 'type-online'}`;

    // Render workflow
    renderWorkflow(room);

    // Render messages
    renderMessages(room);

    // Render action bar
    renderActionBar(room);

    // Refresh list
    renderChatList();
}

// ─── WORKFLOW TRACKER ───
function renderWorkflow(room) {
    const bar = document.getElementById('workflowBar');
    const isOnline = room.ticketType === 'ONLINE';
    const status = room.ticketStatus;

    const offlineSteps = ['MATCHED', 'IN_PROGRESS', 'COMPLETED'];
    const offlineLabels = ['매칭 완료', '서비스 진행', '완료'];

    const onlineSteps = ['MATCHED', 'PAYMENT_PENDING', 'PAID', 'IN_PROGRESS', 'DELIVERED', 'COMPLETED'];
    const onlineLabels = ['매칭 완료', '합의서 확정', '결제', '서비스 진행', '작업물 전달', '완료'];

    const steps = isOnline ? onlineSteps : offlineSteps;
    const labels = isOnline ? onlineLabels : offlineLabels;
    const currentIdx = steps.indexOf(status);

    let html = '';
    steps.forEach((s, i) => {
        const isDone = i < currentIdx;
        const isCurrent = i === currentIdx;
        html += `<div class="wf-step ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}">
            <span class="wf-dot"></span>
            ${labels[i]}
        </div>`;
        if (i < steps.length - 1) {
            html += `<div class="wf-arrow ${isDone ? 'done' : ''}">›</div>`;
        }
    });

    bar.innerHTML = `<div class="workflow-steps">${html}</div>`;
}

// ─── MESSAGES ───
function renderMessages(room) {
    const container = document.getElementById('messages');
    const msgs = messagesByRoom[room.id] || [];
    const myId = currentUserId;

    let html = '';
    msgs.forEach(msg => {
        if (msg.type === 'date') {
            html += `<div class="msg-date-divider"><span>${msg.content}</span></div>`;
        } else if (msg.type === 'system') {
            html += `<div class="msg-system"><div class="msg-system-bubble ${msg.warn ? 'warn' : ''}"><span class="msg-system-icon">${msg.icon || '📌'}</span> ${msg.content}</div></div>`;
        } else if (msg.type === 'agreement') {
            html += renderAgreementCard(msg, room);
        } else if (msg.type === 'delivery') {
            html += renderDeliveryCard(msg, room);
        } else {
            const isMine = msg.sender === myId;
            html += `<div class="msg-row ${isMine ? 'mine' : 'theirs'}">
                ${isMine ? `<span class="msg-read">읽음</span>` : ''}
                <div class="msg-bubble">${msg.text}</div>
                <span class="msg-time">${msg.time || ''}</span>
            </div>`;
        }
    });

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

function renderAgreementCard(msg, room) {
    const d = msg.data;
    const isClient = currentRole === 'client';
    const statusLabel = { PROPOSED: '제안됨', CONFIRMED: '확정됨', REJECTED: '거부됨' }[msg.status];
    const statusClass = msg.status.toLowerCase();

    let actions = '';
    if (msg.status === 'PROPOSED' && !isClient) {
        actions = `<div class="card-actions">
            <button class="card-btn danger" onclick="rejectAgreement()">거절</button>
            <button class="card-btn success" onclick="confirmAgreement()">수락</button>
        </div>`;
    } else if (msg.status === 'REJECTED' && isClient) {
        actions = `<div class="card-actions">
            <button class="card-btn primary" onclick="openAgreementPanel()">재제안하기</button>
        </div>`;
    }

    return `<div class="msg-card"><div class="agreement-card">
        <div class="card-header">
            <div class="card-header-icon agreement">📋</div>
            <div class="card-header-text"><h4>합의서</h4><p>${isClient ? '내가 제안' : '상대방이 제안'}</p></div>
            <span class="card-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="card-body">
            <div class="card-field"><span class="card-field-label">최종 금액</span><span class="card-field-value price">${d.finalPrice?.toLocaleString()}원</span></div>
            <div class="card-field"><span class="card-field-label">작업 마감일</span><span class="card-field-value">${d.workDeadline}</span></div>
            <div class="card-field"><span class="card-field-label">작업 범위</span><span class="card-field-value" style="max-width:60%;text-align:right">${d.scope}</span></div>
            <div class="card-field"><span class="card-field-label">수정 횟수</span><span class="card-field-value">최대 ${d.maxRevisions}회</span></div>
            <div class="card-field"><span class="card-field-label">전달물 형식</span><span class="card-field-value">${d.deliveryFormat}</span></div>
        </div>
        ${actions}
    </div></div>`;
}

function renderDeliveryCard(msg, room) {
    const d = msg.data;
    const isClient = currentRole === 'client';
    const statusLabel = { SUBMITTED: '제출됨', APPROVED: '승인됨', REVISION_REQUESTED: '수정 요청됨' }[msg.status];
    const statusClass = msg.status === 'SUBMITTED' ? 'submitted' : msg.status === 'APPROVED' ? 'approved' : 'rejected';
    const typeLabel = d.deliveryType === 'SERVICE_COMPLETE' ? '서비스 완료 보고' : '파일 전달';

    let filesHtml = '';
    if (d.files && d.files.length > 0) {
        filesHtml = `<div class="delivery-files">${d.files.map(f => `<div class="delivery-file"><span class="delivery-file-icon">${f.endsWith('.pdf') ? '📄' : f.endsWith('.mp4') ? '🎬' : '📎'}</span>${f}</div>`).join('')}</div>`;
    }

    let actions = '';
    if (msg.status === 'SUBMITTED' && isClient) {
        actions = `<div class="card-actions">
            <button class="card-btn danger" onclick="requestRevision()">수정 요청</button>
            <button class="card-btn success" onclick="approveDelivery()">완료 승인</button>
        </div>`;
    }

    return `<div class="msg-card"><div class="delivery-card">
        <div class="card-header">
            <div class="card-header-icon delivery">📦</div>
            <div class="card-header-text"><h4>작업물 전달</h4><p>${typeLabel}</p></div>
            <span class="card-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="card-body">
            <div class="card-field"><span class="card-field-label">메모</span></div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;padding:4px 0 8px">${d.memo}</p>
        </div>
        ${filesHtml}
        ${actions}
    </div></div>`;
}

// ─── ACTION BAR ───
function renderActionBar(room) {
    const bar = document.getElementById('actionBar');
    const isClient = currentRole === 'client';
    const isOnline = room.ticketType === 'ONLINE';
    const status = room.ticketStatus;
    let chips = [];

    if (isClient) {
        if (isOnline && status === 'MATCHED') {
            chips.push({ icon: '📋', label: '합의서 제안', action: 'openAgreementPanel()', highlight: true });
        }
        if (isOnline && status === 'PAYMENT_PENDING') {
            chips.push({ icon: '💳', label: '에스크로 결제하기', action: 'doPayment()', highlight: true });
        }
        if (isOnline && status === 'DELIVERED') {
            chips.push({ icon: '✅', label: '완료 승인', action: 'approveDelivery()' });
            chips.push({ icon: '🔄', label: '수정 요청', action: 'requestRevision()' });
        }
        if (!isOnline && status === 'IN_PROGRESS') {
            chips.push({ icon: '✅', label: '완료 확인', action: 'completeOffline()', highlight: true });
        }
        if (status === 'COMPLETED' || room.reviewPending) {
            chips.push({ icon: '⭐', label: '리뷰 남기기', action: 'openReview()' });
        }
    } else {
        // Expert view
        if (isOnline && status === 'IN_PROGRESS') {
            chips.push({ icon: '📦', label: '작업물 전달', action: 'openDeliveryPanel()', highlight: true });
        }
        if (!isOnline && status === 'MATCHED') {
            chips.push({ icon: '🚀', label: '서비스 시작', action: 'startOfflineService()' });
        }
    }

    // Common chips
    chips.push({ icon: '📎', label: '파일 첨부', action: 'attachFile()' });
    chips.push({ icon: '📷', label: '이미지', action: 'attachImage()' });

    bar.innerHTML = chips.map(c =>
        `<button class="action-chip ${c.highlight ? 'highlight' : ''}" onclick="${c.action}"><span class="action-chip-icon">${c.icon}</span>${c.label}</button>`
    ).join('');
}

// ─── SEND MESSAGE ───
function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !activeChatId) return;

    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    const msgs = messagesByRoom[activeChatId];
    msgs.push({ sender: currentUserId, text: text });

    room.lastMessage = text;
    room.lastMessageType = 'TEXT';
    room.lastMessageAt = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    input.value = '';
    input.style.height = 'auto';
    renderMessages(room);
    renderChatList();
}

function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── ROLE SWITCH ───
function setRole(role) {
    currentRole = role;
    document.getElementById('btnClient').classList.toggle('active', role === 'client');
    document.getElementById('btnExpert').classList.toggle('active', role === 'expert');

    document.querySelectorAll('.client-only').forEach(el => el.style.display = role === 'client' ? 'inline-flex' : 'none');
    document.querySelectorAll('.expert-only').forEach(el => el.style.display = role === 'expert' ? 'inline-flex' : 'none');

    if (activeChatId) {
        const room = chatRooms.find(r => r.id === activeChatId);
        if (room) {
            renderMessages(room);
            renderActionBar(room);
        }
    }
}

                    <span class="chat-item-status-tag ${statusClasses[room.ticketStatus]}">${statusLabels[room.ticketStatus]}</span>
                </div>
                <h4 style="font-size:15px;font-weight:700;margin-bottom:4px;">${room.ticketTitle}</h4>
                <p style="font-size:13px;color:var(--text-tertiary);">${room.category}</p>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">참여자</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-sub);border-radius:var(--radius-sm);">
                    <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:16px;">👤</div>
                    <div><div style="font-size:13px;font-weight:600;">의뢰인 (나)</div><div style="font-size:11px;color:var(--text-tertiary);">user#${room.clientId}</div></div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-sub);border-radius:var(--radius-sm);">
                    <div style="width:36px;height:36px;border-radius:50%;background:var(--expert-light);display:flex;align-items:center;justify-content:center;font-size:16px;">${room.opponentEmoji}</div>
                    <div><div style="font-size:13px;font-weight:600;">${room.opponentName}</div><div style="font-size:11px;color:var(--text-tertiary);">전문가</div></div>
                </div>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">진행 상태</div>
            <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
                ${isOnline ? `
                    매칭 완료 → 채팅 협의 → 합의서 확정 → 에스크로 결제 → 서비스 진행 → 작업물 전달 → 완료 확인 → 리뷰
                ` : `
                    매칭 완료 → 채팅 협의 → 대면 서비스 진행 → 완료 확인 → 리뷰
                `}
            </div>
        </div>
    `;
    openPanel('ticketPanel');
}

// ─── ACTIONS ───
function submitAgreement() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    const data = {
        finalPrice: parseInt(document.getElementById('agPrice').value) || 50000,
        workDeadline: document.getElementById('agDeadline').value || '2026-03-05',
        scope: document.getElementById('agScope').value || '작업 범위 미입력',
        maxRevisions: parseInt(document.getElementById('agRevisions').value) || 2,
        deliveryFormat: document.getElementById('agFormat').value || '파일 전달',
    };

    const msgs = messagesByRoom[activeChatId];
    msgs.push({ type: 'agreement', status: 'PROPOSED', data });
    msgs.push({ type: 'system', content: '합의서가 제안되었어요. 내용을 확인해주세요!', icon: '📋' });

    closePanel();
    renderMessages(room);
    renderChatList();
}

function confirmAgreement() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    // Find the agreement message and update it
    const msgs = messagesByRoom[activeChatId];
    const agMsg = msgs.filter(m => m.type === 'agreement').pop();
    if (agMsg) agMsg.status = 'CONFIRMED';

    msgs.push({ type: 'system', content: '합의가 완료되었어요! 다음 단계로 진행합니다.', icon: '✅' });
    room.ticketStatus = 'PAYMENT_PENDING';
    room.lastMessage = '합의가 완료되었어요! 다음 단계로 진행합니다.';
    room.lastMessageType = 'SYSTEM';

    renderMessages(room);
    renderWorkflow(room);
    renderActionBar(room);
    renderChatList();
}

function rejectAgreement() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    const msgs = messagesByRoom[activeChatId];
    const agMsg = msgs.filter(m => m.type === 'agreement').pop();
    if (agMsg) agMsg.status = 'REJECTED';

    msgs.push({ type: 'system', content: '합의서가 거절되었어요. 조건을 다시 이야기해보세요.', icon: '❌' });

    renderMessages(room);
    renderActionBar(room);
    renderChatList();
}

function doPayment() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    if (!confirm('에스크로 결제를 진행하시겠습니까?\n(PortOne V2 SDK 연동 - 시뮬레이션)')) return;

    const msgs = messagesByRoom[activeChatId];
    msgs.push({ type: 'system', content: '안전결제가 완료되었어요! 서비스를 시작해주세요.', icon: '💰' });
    room.ticketStatus = 'IN_PROGRESS';
    room.lastMessage = '안전결제가 완료되었어요! 서비스를 시작해주세요.';
    room.lastMessageType = 'SYSTEM';

    renderMessages(room);
    renderWorkflow(room);
    renderActionBar(room);
    renderChatList();
}

function submitDelivery() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    const memo = document.getElementById('dlMemo').value || '작업을 완료했습니다.';
    const msgs = messagesByRoom[activeChatId];
    msgs.push({ type: 'delivery', status: 'SUBMITTED', data: { deliveryType: 'SERVICE_COMPLETE', memo, files: [] } });
    msgs.push({ type: 'system', content: '전문가가 서비스 완료를 보고했어요. 확인해주세요!', icon: '📦' });

    room.ticketStatus = 'DELIVERED';
    room.lastMessage = '전문가가 결과물을 전달했어요.';
    room.lastMessageType = 'SYSTEM';

    closePanel();
    renderMessages(room);
    renderWorkflow(room);
    renderActionBar(room);
    renderChatList();
}

function approveDelivery() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    if (!confirm('작업물을 승인하시겠습니까?\n승인 후 에스크로 정산이 진행됩니다.')) return;

    const msgs = messagesByRoom[activeChatId];
    const dlMsg = msgs.filter(m => m.type === 'delivery').pop();
    if (dlMsg) dlMsg.status = 'APPROVED';

    msgs.push({ type: 'system', content: '서비스가 완료되었어요! 리뷰를 남겨주세요', icon: '⭐' });
    room.ticketStatus = 'COMPLETED';
    room.lastMessage = '서비스가 완료되었어요! 리뷰를 남겨주세요';
    room.lastMessageType = 'SYSTEM';

    renderMessages(room);
    renderWorkflow(room);
    renderActionBar(room);
    renderChatList();
}

function requestRevision() {
    const reason = prompt('수정 요청 사유를 입력하세요:');
    if (!reason) return;

    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    const msgs = messagesByRoom[activeChatId];
    const dlMsg = msgs.filter(m => m.type === 'delivery').pop();
    if (dlMsg) dlMsg.status = 'REVISION_REQUESTED';

    msgs.push({ type: 'system', content: '의뢰인이 수정을 요청했어요. 마감일이 +3일 연장됩니다.', icon: '🔄' });
    room.lastMessage = '수정 요청이 접수되었어요.';
    room.lastMessageType = 'SYSTEM';

    renderMessages(room);
    renderActionBar(room);
    renderChatList();
}

function completeOffline() {
    const room = chatRooms.find(r => r.id === activeChatId);
    if (!room) return;

    if (!confirm('서비스 완료를 확인하시겠습니까?')) return;

    const msgs = messagesByRoom[activeChatId];
    msgs.push({ type: 'system', content: '서비스가 완료되었어요! 리뷰를 남겨주세요', icon: '⭐' });
    room.ticketStatus = 'COMPLETED';
    room.reviewPending = true;
    room.lastMessage = '서비스가 완료되었어요! 리뷰를 남겨주세요';
    room.lastMessageType = 'SYSTEM';

    renderMessages(room);
    renderWorkflow(room);
    renderActionBar(room);
    renderChatList();
}

function startOfflineService() {
    alert('서비스 시작이 확인되었습니다. (IN_PROGRESS 전이)');
}

function openReview() {
    alert('리뷰 작성 화면으로 이동합니다.\n\n- 채팅 스냅샷이 자동 생성됩니다\n- 48시간 동안 비공개 처리할 메시지를 선택할 수 있습니다\n- 별점을 입력할 수 있습니다 (선택)');
}

function attachFile() { alert('파일 첨부 (구현 예정)\nAPI: POST /v1/api/chat/rooms/{roomId}/messages (messageType=FILE)'); }
function attachImage() { alert('이미지 첨부 (구현 예정)\nAPI: POST /v1/api/chat/rooms/{roomId}/messages (messageType=IMAGE)'); }

function goBackToList() {
    document.getElementById('sidebar').classList.remove('mobile-hide');
    document.getElementById('chatRoom').classList.remove('mobile-show');
    activeChatId = null;
}

// ─── INIT ───
renderChatList();
    </script>
</body>
</html>
